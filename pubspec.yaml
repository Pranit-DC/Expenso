name: expenso
description: "Expenso - A clean, offline-first expense tracker."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Charts
  fl_chart: ^0.65.0

  # Formatting
  intl: ^0.19.0

  # Unique IDs
  uuid: ^4.3.3

  # Backup / Restore
  file_picker: ^8.0.0
  share_plus: ^7.2.1
  path_provider: ^2.1.2

  # Icons
  phosphor_flutter: ^2.0.0

  # Typography
  google_fonts: ^6.1.0

  # Swipe actions
  flutter_slidable: ^3.0.1

  # Animations (Cashew-style micro-animations & page transitions)
  animations: ^2.0.11
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
